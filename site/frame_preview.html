<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dataset Frame Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181b1f;
      --line: #2a3037;
      --text: #f1f3f5;
      --muted: #9aa4af;
      --overlay: #ffbe3d;
      --native: #41d6a6;
      --accent: #68a8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      gap: 12px;
      padding: 14px 18px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }
    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
    }
    .stat {
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #13161a;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(4, minmax(120px, 170px));
      gap: 10px;
    }
    input, select, button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111418;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      background: #1c232c;
    }
    button:hover { border-color: var(--accent); }
    main {
      padding: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: zoom-in;
    }
    .thumb {
      position: relative;
      aspect-ratio: 9 / 16;
      background: #08090a;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .box {
      position: absolute;
      border: 2px solid var(--overlay);
      pointer-events: none;
    }
    .box.native {
      border-color: var(--native);
    }
    .meta {
      display: grid;
      gap: 4px;
      padding: 9px 10px 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .file {
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 6px;
    }
    .chip.overlay { color: var(--overlay); }
    .chip.native { color: var(--native); }
    dialog {
      width: min(96vw, 1400px);
      height: min(94vh, 1100px);
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0d10;
      color: var(--text);
    }
    dialog::backdrop { background: rgba(0, 0, 0, .72); }
    .viewer {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
    }
    .viewerbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .viewer-title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .viewer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .stage {
      overflow: auto;
      display: grid;
      place-items: start center;
      padding: 18px;
    }
    .canvas {
      position: relative;
      transform-origin: top center;
      background: #050607;
    }
    .canvas img {
      display: block;
      max-width: none;
      width: 100%;
      height: auto;
    }
    .canvas .box {
      border-width: 3px;
    }
    .details {
      max-height: 180px;
      overflow: auto;
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .ann-row {
      display: grid;
      grid-template-columns: 86px 140px 1fr;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .controls input {
        grid-column: 1 / -1;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const grid = document.getElementById('grid');
    const visibleStat = document.getElementById('visibleStat');
    const search = document.getElementById('search');
    const pool = document.getElementById('pool');
    const label = document.getElementById('label');
    const boxes = document.getElementById('boxes');
    const dialog = document.getElementById('dialog');
    const canvas = document.getElementById('canvas');
    const stage = document.getElementById('stage');
    const details = document.getElementById('details');
    const viewerTitle = document.getElementById('viewerTitle');
    let visible = [];
    let activeIndex = 0;
    let zoom = 1;

    function matches(frame) {
      const q = search.value.trim().toLowerCase();
      if (pool.value && frame.pool !== pool.value) return false;
      if (label.value === 'empty' && frame.annCount !== 0) return false;
      if (label.value === 'overlay' && frame.overlayCount === 0) return false;
      if (label.value === 'native' && frame.nativeCount === 0) return false;
      if (!q) return true;
      const haystack = [
        frame.rel, frame.video, frame.scene, frame.frame,
        ...frame.annotations.map(a => `${a.label} ${a.category} ${a.text}`)
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }

    function filteredAnnotations(frame) {
      if (boxes.value === 'none') return [];
      if (boxes.value === 'all') return frame.annotations;
      return frame.annotations.filter(a => a.label === boxes.value);
    }

    function boxNode(ann, frame) {
      const [x, y, w, h] = ann.bbox;
      const el = document.createElement('div');
      el.className = `box ${ann.label === 'native' ? 'native' : 'overlay'}`;
      el.style.left = `${x / frame.width * 100}%`;
      el.style.top = `${y / frame.height * 100}%`;
      el.style.width = `${w / frame.width * 100}%`;
      el.style.height = `${h / frame.height * 100}%`;
      el.style.transform = `rotate(${ann.rotation || 0}deg)`;
      el.style.transformOrigin = '50% 50%';
      el.title = `${ann.label} · ${ann.category} · ${ann.rotation || 0}° · ${ann.text}`;
      return el;
    }

    function render() {
      visible = data.frames.filter(matches);
      visibleStat.textContent = `${visible.length} visible`;
      grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      visible.forEach((frame, index) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb">
            <img loading="lazy" src="${frame.src}" alt="">
          </div>
          <div class="meta">
            <div class="file" title="${frame.rel}">${frame.rel}</div>
            <div class="chips">
              <span class="chip">${frame.pool}</span>
              <span class="chip">${frame.video}</span>
              <span class="chip overlay">O ${frame.overlayCount}</span>
              <span class="chip native">N ${frame.nativeCount}</span>
            </div>
          </div>`;
        const thumb = card.querySelector('.thumb');
        filteredAnnotations(frame).forEach(ann => thumb.appendChild(boxNode(ann, frame)));
        card.addEventListener('click', () => openViewer(index));
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    function openViewer(index) {
      activeIndex = index;
      zoom = 1;
      drawViewer();
      dialog.showModal();
    }

    function drawViewer() {
      const frame = visible[activeIndex];
      if (!frame) return;
      viewerTitle.textContent = `${activeIndex + 1} / ${visible.length} · ${frame.rel}`;
      const baseWidth = Math.min(900, Math.max(320, frame.width * 0.55));
      canvas.style.width = `${baseWidth}px`;
      canvas.style.transform = `scale(${zoom})`;
      canvas.innerHTML = `<img src="${frame.src}" alt="">`;
      filteredAnnotations(frame).forEach(ann => canvas.appendChild(boxNode(ann, frame)));
      details.innerHTML = filteredAnnotations(frame).length
        ? filteredAnnotations(frame).map(a => `
            <div class="ann-row">
              <span class="${a.label === 'native' ? 'native' : 'overlay'}">${a.label}</span>
              <span>${a.category} · ${a.rotation || 0}°</span>
              <span>${a.text || '(no text)'}</span>
            </div>`).join('')
        : '<span>当前筛选下没有显示标注框。</span>';
    }

    function updateZoom(delta) {
      zoom = Math.max(0.25, Math.min(6, zoom + delta));
      canvas.style.transform = `scale(${zoom})`;
    }

    search.addEventListener('input', render);
    pool.addEventListener('change', render);
    label.addEventListener('change', render);
    boxes.addEventListener('change', () => {
      render();
      if (dialog.open) drawViewer();
    });
    document.getElementById('reset').addEventListener('click', () => {
      search.value = '';
      pool.value = '';
      label.value = '';
      boxes.value = 'all';
      render();
    });
    document.getElementById('close').addEventListener('click', () => dialog.close());
    document.getElementById('zoomIn').addEventListener('click', () => updateZoom(0.25));
    document.getElementById('zoomOut').addEventListener('click', () => updateZoom(-0.25));
    document.getElementById('fit').addEventListener('click', () => {
      zoom = 1;
      drawViewer();
    });
    document.getElementById('prev').addEventListener('click', () => {
      activeIndex = (activeIndex - 1 + visible.length) % visible.length;
      zoom = 1;
      drawViewer();
    });
    stage.addEventListener('wheel', (event) => {
      if (!event.metaKey && !event.ctrlKey) return;
      event.preventDefault();
      updateZoom(event.deltaY > 0 ? -0.15 : 0.15);
    }, { passive: false });
    window.addEventListener('keydown', (event) => {
      if (!dialog.open) return;
      if (event.key === 'ArrowRight') {
        activeIndex = (activeIndex + 1) % visible.length;
        zoom = 1;
        drawViewer();
      }
      if (event.key === 'ArrowLeft') {
        activeIndex = (activeIndex - 1 + visible.length) % visible.length;
        zoom = 1;
        drawViewer();
      }
      if (event.key === '+' || event.key === '=') updateZoom(0.25);
      if (event.key === '-') updateZoom(-0.25);
    });
    render();
  </script>
